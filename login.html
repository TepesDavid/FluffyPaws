<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autentificare - FluffyPaws</title>
    <link rel="icon" type="image/png" href="images/paw-prints-removebg-preview.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script>if (localStorage.getItem('isLoggedIn') === 'true') document.documentElement.classList.add('is-logged-in');</script>
</head>

<body>

    <div class="auth-page">
        <div class="auth-container">
            <!-- Close Button -->
            <a href="index.html" class="auth-close-btn" title="Înapoi la pagina principală">
                <i class="fas fa-times"></i>
            </a>

            <!-- Left Side - Image -->
            <div class="auth-image">
                <img src="https://images.unsplash.com/photo-1587300003388-59208cc962cb?w=800&h=1000&fit=crop"
                    alt="Câine fericit">
                <div class="auth-image-content">
                    <h2>Bine ai revenit!</h2>
                    <p>Autentifică-te pentru a continua să schimbi vieți. Animalele te așteaptă cu nerăbdare.</p>
                </div>
            </div>

            <!-- Right Side - Form -->
            <div class="auth-form-wrapper">

                <h2>Autentificare</h2>
                <p class="auth-subtitle">Intră în contul tău pentru a adopta sau gestiona cererile.</p>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email <span class="required">*</span></label>
                        <div class="form-control-icon">
                            <input type="email" id="email" class="form-control" placeholder="exemplu@email.com"
                                required>
                            <i class="fas fa-envelope"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Parolă <span class="required">*</span></label>
                        <div class="form-control-icon">
                            <input type="password" id="password" class="form-control" placeholder="Introdu parola"
                                required>
                            <i class="fas fa-lock"></i>
                        </div>
                    </div>

                    <div class="remember-forgot">
                        <label class="form-check">
                            <input type="checkbox"> Ține-mă minte
                        </label>
                        <a href="#">Ai uitat parola?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block btn-lg">
                        <i class="fas fa-sign-in-alt"></i> Autentificare
                    </button>

                    <div class="social-login">
                        <div class="divider-text">sau continuă cu</div>
                        <div class="social-buttons">
                            <button type="button" class="btn btn-outline-light">
                                <i class="fab fa-google"></i> Google
                            </button>
                            <button type="button" class="btn btn-outline-light">
                                <i class="fab fa-facebook-f"></i> Facebook
                            </button>
                        </div>
                    </div>
                </form>

                <div class="auth-links">
                    Nu ai un cont? <a href="register.html">Creează unul acum</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
